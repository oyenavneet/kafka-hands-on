spring:
  cloud:
    function:
      definition: producer
    stream:
      poller:
        fixed-delay: 1000 # default value
      bindings:
        producer-out-0:
          destination: demo-topic
      kafka:
        binder:
          brokers:
            - localhost:9092
          configuration:
            security.protocol: SASL_SSL
            ssl.truststore.type: JKS
            ssl.truststore.location: classpath:/sec20/kafka.truststore.jks
            ssl.truststore.password: changeit
            sasl.mechanism: PLAIN
            sasl.jaas.config: >
              org.apache.kafka.common.security.plain.PlainLoginModule required
              username="app-user"
              password="secret123";